name: Nightly Build

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  push:
    branches: [ master ]
  workflow_dispatch:
    # Allow manual trigger

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/${{ github.repository }}/tauri-builder:latest

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: ${{ env.IMAGE_NAME }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: /root/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: /root/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Install dependencies
      working-directory: frontend
      run: pnpm install --frozen-lockfile

    - name: Build Tauri app for Linux
      working-directory: frontend
      run: |
        pnpm tauri build --target x86_64-unknown-linux-gnu

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: |
          frontend/src-tauri/target/release/bundle/deb/*.deb
          frontend/src-tauri/target/release/bundle/appimage/*.AppImage
        retention-days: 30

  build-windows:
    runs-on: ubuntu-latest
    container:
      image: g${{ env.IMAGE_NAME }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: /root/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-windows-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: /root/.cargo/git
        key: ${{ runner.os }}-cargo-index-windows-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Install dependencies
      working-directory: frontend
      run: pnpm install --frozen-lockfile

    - name: Build Tauri app for Windows
      working-directory: frontend
      run: |
        pnpm tauri build --target x86_64-pc-windows-gnu

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: |
          frontend/src-tauri/target/x86_64-pc-windows-gnu/release/bundle/nsis/*.exe
          frontend/src-tauri/target/x86_64-pc-windows-gnu/release/bundle/msi/*.msi
        retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    container:
      image: ${{ env.IMAGE_NAME }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: /root/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-android-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: /root/.cargo/git
        key: ${{ runner.os }}-cargo-index-android-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: frontend/node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          /root/.gradle/caches
          /root/.gradle/wrapper
          frontend/src-tauri/gen/android/.gradle
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

    - name: Install dependencies
      working-directory: frontend
      run: pnpm install --frozen-lockfile

    - name: Initialize Android project
      working-directory: frontend
      run: |
        pnpm tauri android init

    - name: Build Android APK
      working-directory: frontend
      run: |
        pnpm tauri android build --apk

    - name: Build Android AAB
      working-directory: frontend
      run: |
        pnpm tauri android build --aab

    - name: Upload Android artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-build
        path: |
          frontend/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          frontend/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
        retention-days: 30

  create-nightly-release:
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    if: always() && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success' || needs.build-android.result == 'success')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Download Linux artifacts
      if: needs.build-linux.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: linux-build
        path: artifacts/linux/
      continue-on-error: true

    - name: Download Windows artifacts
      if: needs.build-windows.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: artifacts/windows/
      continue-on-error: true

    - name: Download Android artifacts
      if: needs.build-android.result == 'success'
      uses: actions/download-artifact@v4
      with:
        name: android-build
        path: artifacts/android/
      continue-on-error: true

    - name: List artifacts
      run: |
        echo "=== Artifacts Directory Structure ==="
        find artifacts -type f -ls 2>/dev/null || echo "No artifacts found"

    - name: Delete existing nightly release
      run: |
        gh release delete nightly --yes || echo "No existing nightly release to delete"
        git tag -d nightly || echo "No existing nightly tag to delete"
        git push origin :refs/tags/nightly || echo "No existing nightly tag on remote to delete"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create nightly release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly
        name: "Nightly Build ${{ steps.date.outputs.date }}"
        body: |
          🌙 **Nightly Build** - ${{ steps.date.outputs.date }}

          This is an automated nightly build of the Gestalt frontend application.

          **Available builds:**
          - 🐧 **Linux**: .deb packages and AppImage
          - 🪟 **Windows**: .exe (NSIS) and .msi installers
          - 🤖 **Android**: .apk and .aab files

          **⚠️ Note**: These are development builds and may be unstable.

          Built from commit: ${{ github.sha }}
        files: |
          artifacts/**/*
        prerelease: true
        make_latest: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
